{% extends 'base.html' %}
{% block title %}Log In | Healthy Plate Quest{% endblock %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-sm-10 col-md-6 col-lg-5">

        <div class="text-center mb-4">
        <div style="font-size:3rem">🥗</div>
        <h2 class="fw-bold mt-2 mb-0">Welcome back!</h2>
        <p class="text-muted">Your quest awaits.</p>
        </div>

        <div class="card border-0 shadow">
        <div class="card-body p-4">
            <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username or Email</label>
                <input type="text" name="identifier" class="form-control" required autofocus
                    placeholder="Enter your username or email">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required
                    placeholder="Enter your password">
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label text-muted" for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-lg">Log In</button>
            </form>
        </div>
        </div>

        <p class="text-center text-muted mt-3 small">
        New here?
        <a href="{{ url_for('auth.register') }}" class="text-success fw-bold">Start your quest!</a>
        </p>
    </div>
</div>
{% endblock %}
