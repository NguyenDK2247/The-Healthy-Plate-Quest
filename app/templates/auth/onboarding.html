{% extends 'base.html' %}
{% block title %}Setup Your Profile | Healthy Plate Quest{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="mb-1">🎯 Let's personalize your quest!</h2>
                <p class="text-muted mb-4">This helps us tailor challenges and AI coaching just for you.</p>
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Your Age</label>
                            <input type="number" name="age" class="form-control" min="10" max="120" placeholder="e.g. 21">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Primary Nutrition Goal</label>
                        <select name="nutrition_goal" class="form-select">
                            <option value="general">General Healthy Eating</option>
                            <option value="energy">More Energy & Focus</option>
                            <option value="weight_management">Weight Management</option>
                            <option value="gut_health">Gut Health</option>
                            <option value="muscle_building">Muscle Building</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dietary Preference</label>
                        <select name="dietary_preference" class="form-select">
                            <option value="omnivore">Omnivore</option>
                            <option value="vegetarian">Vegetarian</option>
                            <option value="vegan">Vegan</option>
                            <option value="pescatarian">Pescatarian</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Any dietary restrictions? <small class="text-muted">(optional)</small></label>
                        <input type="text" name="dietary_restrictions" class="form-control" placeholder="e.g. gluten, lactose, nuts">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Favorite ingredients <small class="text-muted">(optional)</small></label>
                        <input type="text" name="favorite_ingredients" class="form-control" placeholder="e.g. chicken, pasta, broccoli, avocado">
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100">Begin My Quest 🚀</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
