{% extends 'base.html' %}
{% block title %}Create Account | Healthy Plate Quest{% endblock %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="text-center mb-4">
        <div style="font-size:3rem">🌱</div>
        <h2 class="fw-bold mt-2 mb-0">Create your account</h2>
        <p class="text-muted">Earn 50 XP just for signing up!</p>
        </div>

        <div class="card border-0 shadow">
        <div class="card-body p-4">
            <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus
                    minlength="3" placeholder="Choose a username">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required
                    placeholder="your@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required
                    minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required
                    placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn btn-success w-100 btn-lg">
                Create Account 🚀
            </button>
            </form>
        </div>
        </div>

        <p class="text-center text-muted mt-3 small">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-success fw-bold">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
