{% extends 'base.html' %}
{% block title %}Edit Profile | Healthy Plate Quest{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-4">✏️ Edit Profile</h3>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Display Name</label>
            <input type="text" name="display_name" class="form-control"
                   value="{{ current_user.display_name or current_user.username }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Bio <small class="text-muted">(optional)</small></label>
            <textarea name="bio" class="form-control" rows="2" maxlength="280">{{ current_user.bio or '' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Nutrition Goal</label>
            <select name="nutrition_goal" class="form-select">
              {% for val, label in [('general','General Healthy Eating'),('energy','More Energy & Focus'),
                ('weight_management','Weight Management'),('gut_health','Gut Health'),('muscle_building','Muscle Building')] %}
              <option value="{{ val }}" {{ 'selected' if current_user.nutrition_goal == val }}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Dietary Preference</label>
            <select name="dietary_preference" class="form-select">
              {% for val in ['omnivore','vegetarian','vegan','pescatarian'] %}
              <option value="{{ val }}" {{ 'selected' if current_user.dietary_preference == val }}>{{ val|title }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Dietary Restrictions</label>
            <input type="text" name="dietary_restrictions" class="form-control"
                   value="{{ current_user.dietary_restrictions or '' }}" placeholder="e.g. gluten, lactose">
          </div>
          <div class="mb-4">
            <label class="form-label">Favorite Ingredients</label>
            <input type="text" name="favorite_ingredients" class="form-control"
                   value="{{ current_user.favorite_ingredients or '' }}" placeholder="e.g. chicken, pasta, broccoli">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('profile.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
